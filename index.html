<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
body{margin:0;background:#fff;font-family:'Montserrat';}

/* HEADER */
header{
background:#000;
color:white;
padding:35px 20px;
display:flex;
flex-direction:column;
align-items:center;
}

.logo{
width:clamp(110px,14vw,170px);
height:clamp(110px,14vw,170px);
object-fit:cover;
border-radius:50%;
border:3px solid #d4af37;
margin-bottom:15px;
}

h1{
font-family:'Cinzel';
color:#d4af37;
font-size:clamp(20px,3vw,28px);
letter-spacing:3px;
text-align:center;
}

/* SECCIONES */
.section{
text-align:center;
font-family:'Cinzel';
margin:40px 0 10px;
font-size:18px;
}

.section::after{
content:"";
width:90px;
height:3px;
background:#d4af37;
display:block;
margin:10px auto;
}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
padding:20px;
}

/* CARD */
.card{
background:white;
border-radius:14px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
position:relative;
transition:.3s;
}
.card:hover{transform:translateY(-5px);}

/* SLIDER */
.slider{position:relative;}

.slider img{
width:100%;
height:260px;
object-fit:cover;
display:none;
cursor:pointer;
}

.slider img.active{display:block;}

.btn-slider{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,0.6);
color:white;
border:none;
padding:6px 12px;
cursor:pointer;
border-radius:6px;
}

.prev{left:10px;}
.next{right:10px;}

/* ETIQUETAS */
.hot{
position:absolute;
top:10px;
left:10px;
background:linear-gradient(45deg,#d4af37,#f7e7a1);
color:black;
padding:5px 10px;
font-size:11px;
font-weight:bold;
border-radius:8px;
}

.stock{
font-size:12px;
color:#d4af37;
margin-top:5px;
}

/* INFO */
.info{text-align:center;padding:15px;}
.title{font-family:'Cinzel';font-size:15px;}
.price{color:#c9a646;font-weight:bold;font-size:16px;}
.tallas{font-size:13px;color:#555;margin-top:5px;}

.btn{
background:#000;
color:white;
padding:10px;
border-radius:6px;
cursor:pointer;
margin-top:10px;
transition:.3s;
}
.btn:hover{
background:#d4af37;
color:black;
}

/* 🛒 ICONO */
.cart{
position:fixed;
right:20px;
top:20px;
background:#000;
color:white;
padding:14px;
border-radius:50%;
cursor:pointer;
z-index:1000;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* 🔥 NUEVO CARRITO ELEGANTE */
.panel{
position:fixed;
right:-350px;
top:20px;
width:300px;
max-height:85vh;
background:white;
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,0.25);
padding:20px;
transition:.4s cubic-bezier(.77,0,.18,1);
z-index:1000;
display:flex;
flex-direction:column;
}

.panel.active{right:20px;}

.panel h3{
margin-top:0;
font-family:'Cinzel';
color:#d4af37;
}

/* lista scroll */
#lista{
overflow-y:auto;
max-height:300px;
padding:0;
}

/* items */
#lista li{
list-style:none;
padding:8px 0;
border-bottom:1px solid #eee;
font-size:14px;
}

/* eliminar */
.remove{
color:red;
cursor:pointer;
margin-left:8px;
}

/* cerrar */
.close{
position:absolute;
top:10px;
right:15px;
font-size:22px;
cursor:pointer;
}

/* boton enviar */
#enviar{
margin-top:auto;
background:#25D366;
padding:12px;
text-align:center;
border-radius:10px;
text-decoration:none;
color:white;
font-weight:bold;
}

/* MODAL ZOOM */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
justify-content:center;
align-items:center;
z-index:999;
}

.modal img{
max-width:90%;
max-height:85%;
border-radius:10px;
}

.closeModal{
position:absolute;
top:20px;
right:30px;
color:white;
font-size:30px;
cursor:pointer;
}

/* WHATS */
.wsp{
position:fixed;
bottom:20px;
left:20px;
background:#25D366;
padding:14px;
border-radius:50%;
color:white;
}
</style>
</head>

<body>

<header>
<img src="logo.webp" class="logo">
<h1>ELEGANT MONKEY SHOP<br>CATÁLOGO DE ROPA</h1>
</header>

<div class="section">PLAYERAS</div>
<div class="container" id="playeras"></div>

<div class="section">PLAYERAS DE PEDRERIA</div>
<div class="container" id="pedreria"></div>

<div class="section">SHORTS</div>
<div class="container" id="shorts"></div>

<div class="cart" onclick="abrir()">🛒 <span id="count">0</span></div>

<div class="panel" id="panel">
<div class="close" onclick="cerrar()">✖</div>
<h3>Tu pedido</h3>
<ul id="lista"></ul>
<a id="enviar" target="_blank">Enviar pedido</a>
</div>

<a href="https://wa.me/5219381264237" class="wsp">💬</a>

<div class="modal" id="modal">
<span class="closeModal" onclick="cerrarModal()">✖</span>
<img id="imgModal">
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* DETECTOR */
function detectarImagenes(prefijo,max=15){
return new Promise(resolve=>{
let imgs=[]; let cargadas=0;
for(let i=1;i<=max;i++){
let img=new Image();
img.src=`${prefijo}_${i}.webp`;
img.onload=()=>{imgs.push(img.src);check();}
img.onerror=()=>{check();}
function check(){cargadas++; if(cargadas===max) resolve(imgs);}
}
});
}

/* CREAR */
async function crear(nombre,precio,prefijo,cont,i){
let imgs=await detectarImagenes(prefijo);
if(imgs.length===0) return;

let hot = i<=3 ? '<div class="hot">HOT</div>' : '';
let stock = i<=4 ? '<div class="stock">POCAS PIEZAS</div>' : '';

let imagesHTML = imgs.map((img,index)=>
`<img src="${img}" class="${index==0?'active':''}" onclick="zoom('${img}')">`
).join("");

document.getElementById(cont).innerHTML+=`
<div class="card">
${hot}
<div class="slider">
${imagesHTML}
<button class="btn-slider prev" onclick="moveSlide(this,-1)">‹</button>
<button class="btn-slider next" onclick="moveSlide(this,1)">›</button>
</div>
<div class="info">
<div class="title">${nombre}</div>
<div class="price">$${precio}</div>
<div class="tallas">Tallas: S, M, L, XL</div>
${stock}
<div class="btn" onclick="add('${nombre}')">Agregar</div>
</div>
</div>`;
}

/* GENERAR */
for(let i=1;i<=25;i++) crear("Playera Modelo "+i,420,`p${i}`,"playeras",i);
for(let i=1;i<=25;i++) crear("Pedreria "+i,420,`pd${i}`,"pedreria",i);
for(let i=1;i<=25;i++) crear("Short "+i,480,`s${i}`,"shorts",i);

/* SLIDER */
function moveSlide(btn,dir){
const slider=btn.parentElement;
const images=slider.querySelectorAll("img");
let index=[...images].findIndex(img=>img.classList.contains("active"));
images[index].classList.remove("active");
index=(index+dir+images.length)%images.length;
images[index].classList.add("active");
}

/* CARRITO */
function abrir(){panel.classList.add("active");}
function cerrar(){panel.classList.remove("active");}

function add(n){cart.push(n);guardar();}
function remove(i){cart.splice(i,1);guardar();}

function guardar(){
localStorage.setItem("cart",JSON.stringify(cart));
update();
}

function update(){
lista.innerHTML="";
cart.forEach((p,i)=>{
lista.innerHTML+=`<li>${p} <span class="remove" onclick="remove(${i})">✖</span></li>`;
});
count.textContent=cart.length;

let txt=encodeURIComponent("Hola quiero este pedido: "+cart.join(", "));
enviar.href=`https://wa.me/5219381264237?text=${txt}`;
}
update();

/* ZOOM */
function zoom(src){
modal.style.display="flex";
imgModal.src=src;
}
function cerrarModal(){modal.style.display="none";}
modal.addEventListener("click",(e)=>{if(e.target===modal) cerrarModal();});
</script>

</body>
</html>
